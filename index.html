<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المشاوير الزجاجي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container glass">
        
        <section id="home" class="tab-content active">
            <h2>مرحباً بك في تطبيقنا!</h2>
            <p>اطلب مشوارك الآن بكل سهولة وأمان.</p>
            <button class="btn primary-btn" onclick="switchTab('book')">احجز الآن</button>
        </section>

        <section id="book" class="tab-content">
            <h2>احجز رحلتك</h2>
            <div class="form-group">
                <label>موقع الانطلاق:</label>
                <div class="input-with-btn">
                    <input type="text" id="pickup" placeholder="أدخل موقع الانطلاق...">
                    <button class="icon-btn" onclick="getCurrentLocation()" title="موقعي الحالي"><i class="fas fa-map-marker-alt"></i></button>
                </div>
            </div>
            
            <div class="form-group">
                <label>الوجهة:</label>
                <input type="text" id="dropoff" placeholder="إلى أين تود الذهاب؟">
            </div>

            <div class="form-group">
                <label>نوع السيارة:</label>
                <select id="car-type">
                    <option value="اقتصادي">اقتصادي</option>
                    <option value="عائلي">عائلي</option>
                    <option value="VIP">VIP</option>
                    <option value="فان">فان</option>
                </select>
            </div>

            <div class="form-group">
                <label>ملاحظات للسائق:</label>
                <textarea id="notes" rows="2" placeholder="أي ملاحظات إضافية؟"></textarea>
            </div>

            <div class="actions">
                <button class="btn calc-btn" onclick="calculateCost()">احسب الكلفة</button>
                <div id="cost-display" class="cost-display"></div>
                <button class="btn primary-btn" onclick="confirmRide()">تأكيد الطلب</button>
            </div>
        </section>

        <section id="rides" class="tab-content">
            <h2>سجل رحلاتي</h2>
            <div id="rides-list" class="rides-list">
                </div>
        </section>

        <section id="notifications" class="tab-content">
            <h2>الإشعارات</h2>
            <p>لا توجد إشعارات جديدة حالياً.</p>
        </section>

        <section id="account" class="tab-content">
            <h2>حسابي</h2>
            <p>الاسم: مستخدم تجريبي</p>
            <p>رقم الهاتف: 078xxxxxxx</p>
            <button class="btn danger-btn" onclick="clearData()">مسح بيانات الرحلات</button>
        </section>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home')">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </button>
            <button class="nav-item" onclick="switchTab('book')">
                <i class="fas fa-car"></i>
                <span>احجز</span>
            </button>
            <button class="nav-item" onclick="switchTab('rides')">
                <i class="fas fa-list-alt"></i>
                <span>رحلاتي</span>
            </button>
            <button class="nav-item" onclick="switchTab('notifications')">
                <i class="fas fa-bell"></i>
                <span>الإشعارات</span>
            </button>
            <button class="nav-item" onclick="switchTab('account')">
                <i class="fas fa-user"></i>
                <span>حسابي</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
